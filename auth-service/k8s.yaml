apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service
        ports:
        - containerPort: 8080
        env:
        - name: KEYCLOAK_INTERNAL_URL
          value: "http://keycloak:8080"
        - name: KEYCLOAK_PUBLIC_URL
          value: "http://localhost:8180"
        - name: KEYCLOAK_REALM
          value: "nexusgrid"
        - name: KEYCLOAK_CLIENT_ID
          value: "nexusgrid-client"
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: keycloak-client-secret
              key: secret
        - name: REDIRECT_URL
          value: "http://localhost:8081/callback"
        - name: FRONTEND_URL
          value: "http://localhost:3000"
        - name: PORT
          value: "8080"
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 5
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
